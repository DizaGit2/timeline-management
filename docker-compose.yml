services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: timeline
      POSTGRES_USER: timeline
      POSTGRES_PASSWORD: timeline_demo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeline -d timeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: disadocker/timeline-management-backend:latest
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://timeline:timeline_demo_password@postgres:5432/timeline
      JWT_SECRET: demo-jwt-secret-at-least-32-chars-long-xyz
      JWT_REFRESH_SECRET: demo-refresh-secret-at-least-32-chars-xyz
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: disadocker/timeline-management-frontend:latest
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
